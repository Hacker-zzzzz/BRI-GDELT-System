<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6fbff"/>
      <stop offset="100%" stop-color="#eef4f7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f2737" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#168aad"/>
    </marker>
    <style>
      .title { font: 700 42px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #123047; }
      .subtitle { font: 400 22px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #526675; }
      .layer-title { font: 700 28px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #102a43; }
      .layer-text { font: 400 20px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #415668; }
      .side-title { font: 700 24px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #123047; }
      .side-text { font: 400 19px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #40576a; }
      .tag { font: 700 18px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #ffffff; }
      .small { font: 400 17px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #5c6f7d; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <text x="80" y="90" class="title">系统总体架构</text>
  <text x="80" y="128" class="subtitle">JavaFX + Service + Repository + SQLite 的分层设计，Domain 与 Util 提供模型和解析支撑</text>

  <rect x="80" y="170" width="980" height="130" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="80" y="170" width="18" height="130" rx="9" fill="#1b4965"/>
  <text x="130" y="220" class="layer-title">JavaFX UI 层</text>
  <text x="130" y="257" class="layer-text">MainView / 图表 / 表格 / 专题地图 / 导入与导出交互</text>
  <rect x="830" y="205" width="170" height="46" rx="23" fill="#1b4965"/>
  <text x="864" y="235" class="tag">展示与交互</text>

  <line x1="570" y1="310" x2="570" y2="365" stroke="#168aad" stroke-width="5" marker-end="url(#arrow)"/>

  <rect x="80" y="370" width="980" height="130" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="80" y="370" width="18" height="130" rx="9" fill="#168aad"/>
  <text x="130" y="420" class="layer-title">Service 业务层</text>
  <text x="130" y="457" class="layer-text">导入 / 查询 / 双边关系 / 合作分析 / 风险评估 / 地图 / 导出</text>
  <rect x="830" y="405" width="170" height="46" rx="23" fill="#168aad"/>
  <text x="864" y="435" class="tag">业务规则</text>

  <line x1="570" y1="510" x2="570" y2="565" stroke="#168aad" stroke-width="5" marker-end="url(#arrow)"/>

  <rect x="80" y="570" width="980" height="130" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="80" y="570" width="18" height="130" rx="9" fill="#34a0a4"/>
  <text x="130" y="620" class="layer-title">Repository 数据访问层</text>
  <text x="130" y="657" class="layer-text">DatabaseManager / GdeltEventRepository / CountryRepository / ImportBatchRepository</text>
  <rect x="830" y="605" width="170" height="46" rx="23" fill="#34a0a4"/>
  <text x="873" y="635" class="tag">SQL 聚合</text>

  <line x1="570" y1="710" x2="570" y2="765" stroke="#168aad" stroke-width="5" marker-end="url(#arrow)"/>

  <rect x="80" y="770" width="980" height="88" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="80" y="770" width="18" height="88" rx="9" fill="#52b788"/>
  <text x="130" y="823" class="layer-title">SQLite 本地数据库</text>
  <text x="505" y="823" class="layer-text">countries / gdelt_events / import_batches / analysis_results</text>

  <rect x="1130" y="185" width="390" height="165" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  <text x="1165" y="235" class="side-title">Domain 模型</text>
  <text x="1165" y="275" class="side-text">GdeltEvent、Country</text>
  <text x="1165" y="307" class="side-text">CooperationScore、RiskAssessment</text>
  <text x="1165" y="339" class="side-text">RegionSummary、ClusterResult</text>

  <rect x="1130" y="390" width="390" height="165" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  <text x="1165" y="440" class="side-title">Util 工具类</text>
  <text x="1165" y="480" class="side-text">GdeltFieldMapper：字段下标</text>
  <text x="1165" y="512" class="side-text">GdeltLineParser：安全解析</text>
  <text x="1165" y="544" class="side-text">EventType：合作/冲突分类</text>

  <rect x="1130" y="595" width="390" height="190" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  <text x="1165" y="645" class="side-title">设计重点</text>
  <circle cx="1174" cy="684" r="5" fill="#168aad"/>
  <text x="1192" y="691" class="side-text">界面不直接写 SQL</text>
  <circle cx="1174" cy="724" r="5" fill="#168aad"/>
  <text x="1192" y="731" class="side-text">业务逻辑集中在 Service</text>
  <circle cx="1174" cy="764" r="5" fill="#168aad"/>
  <text x="1192" y="771" class="side-text">数据库访问统一封装</text>

  <line x1="1080" y1="268" x2="1120" y2="268" stroke="#8ab6c8" stroke-width="3" stroke-dasharray="8 8"/>
  <line x1="1080" y1="473" x2="1120" y2="473" stroke="#8ab6c8" stroke-width="3" stroke-dasharray="8 8"/>
  <line x1="1080" y1="690" x2="1120" y2="690" stroke="#8ab6c8" stroke-width="3" stroke-dasharray="8 8"/>

  <text x="80" y="884" class="small">答辩讲解重点：分层让职责清楚，便于维护，也能把导入、查询、分析、可视化和导出串成完整闭环。</text>
</svg>
